<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjeta de presentación</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>   
  <main class="tarjeta-contenedor">
    <section class="foto-usuario">
      <img src="assets/user.jpg" alt="">
    </section>
    <section class="tarjeta">
      <div class="tarjeta-foto">
        <!-- <img src="assets/programming-side.jpg" alt="" width="150px"> -->
      </div>
      <section class="tarjeta-contenido">
        <header class="ocupacion">Front-end Developer</header>
        <h2 class="nombre-completo">Mariana Navarro</h2>
        <p class="descripcion">Desarrolladora web especializada en la enseñanaza de HTML5, CSS3 y JS.</p>
        <footer class="redes-sociales">
          <nav>
            <a href="https://www.instagram.com/" target="_blank"><img src="assets/instagram-1-svgrepo-com (1).svg" alt="icono de instagram" width="40px"></a>
            <a href="https://www.linkedin.com/" target="_blank"><img src="assets/linkedin-svgrepo-com.svg" alt="icono de linkedin" width="40px"></a>
            <a href="https://www.youtube.com/" target="_blank"><img src="assets/youtube-color-svgrepo-com (1).svg" alt="icono de youtube" width="40px"></a>
          </nav>
        </footer>
      </section>
    </section>

  </main>
</body>
</html>
